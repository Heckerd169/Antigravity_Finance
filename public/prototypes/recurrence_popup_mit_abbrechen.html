
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,'Helvetica Neue',sans-serif}
.w{background:var(--color-background-secondary);border-radius:20px;padding:24px;display:flex;justify-content:center}
.overlay{background:rgba(0,0,0,.6);border-radius:14px;padding:40px;display:flex;align-items:center;justify-content:center;width:100%}
.popup{background:#1C1C1E;border:.5px solid rgba(255,255,255,.1);border-radius:16px;padding:20px;width:260px}
.popup-title{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.22);margin-bottom:4px}
.popup-sub{font-size:14px;font-weight:500;color:#fff;margin-bottom:4px;letter-spacing:-.3px}
.popup-amount{font-size:12px;color:rgba(255,255,255,.3);margin-bottom:18px;font-variant-numeric:tabular-nums}
.recur-label{font-size:9px;font-weight:600;letter-spacing:.9px;text-transform:uppercase;color:rgba(255,255,255,.2);margin-bottom:8px}
.recur-opts{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.ropt{
  background:rgba(255,255,255,.05);border:.5px solid rgba(255,255,255,.08);border-radius:9px;
  padding:9px 10px;font-size:11px;font-weight:500;color:rgba(255,255,255,.45);
  cursor:pointer;text-align:center;transition:background .15s,color .15s,border-color .15s;
}
.ropt:hover{background:rgba(62,207,175,.1);border-color:rgba(62,207,175,.3);color:#3ECFAF}
.ropt.sel{background:rgba(62,207,175,.12);border-color:rgba(62,207,175,.4);color:#3ECFAF}
.divider{height:.5px;background:rgba(255,255,255,.06);margin-bottom:12px}
.cancel-btn{
  width:100%;padding:9px;background:transparent;border:.5px solid rgba(255,255,255,.07);
  border-radius:9px;font-size:11px;font-weight:500;color:rgba(255,255,255,.25);
  cursor:pointer;text-align:center;transition:background .15s,color .15s;
}
.cancel-btn:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.55)}
</style>

<div class="w">
<h2 class="sr-only">Recurrence-Popup mit Abbrechen-Button</h2>
<div class="overlay">
  <div class="popup">
    <div class="popup-title">Neue Karte erstellen</div>
    <div class="popup-sub">Aral Tankstelle Frankfurt</div>
    <div class="popup-amount">−47,20 € · 12. März 2026</div>
    <div class="recur-label">Wiederholung</div>
    <div class="recur-opts">
      <div class="ropt" onclick="sel(this)">Monatlich</div>
      <div class="ropt" onclick="sel(this)">Quartalsweise</div>
      <div class="ropt" onclick="sel(this)">Halbjährlich</div>
      <div class="ropt" onclick="sel(this)">Jährlich</div>
    </div>
    <div class="divider"></div>
    <div class="cancel-btn" onclick="this.closest('.overlay').style.display='none'">Abbrechen</div>
  </div>
</div>
</div>

<script>
function sel(el){
  document.querySelectorAll('.ropt').forEach(function(r){r.classList.remove('sel')});
  el.classList.add('sel');
}
</script>
